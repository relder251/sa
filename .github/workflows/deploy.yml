name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy and smoke test
    runs-on: [self-hosted, linux, prod]

    steps:
      - name: Deploy
        run: bash /opt/agentic-sdlc/scripts/deploy.sh

      - name: Smoke test
        run: bash /opt/agentic-sdlc/scripts/smoke_test.sh
