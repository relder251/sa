################################################################################
# ROUTER — fallback chains between tiers
# If a whole tier is down, escalate to the next.
# Format: { "source_model_group": ["fallback_group1", "fallback_group2"] }
################################################################################
router_settings:
  routing_strategy: least-busy           # within a group: pick least loaded
  num_retries: 2
  timeout: 900
  retry_after: 2
  allowed_fails: 2                        # mark a model unhealthy after 2 fails
  cooldown_time: 60                       # seconds before retrying a failed model

  # Cross-tier fallbacks — only kicks in if ALL models in the primary group fail
  fallbacks:
    # Local tier: local → hybrid → free → cloud
    - local/chat:    ["hybrid/chat",   "free/chat",   "cloud/fast"]
    - local/code:    ["hybrid/code",   "free/code",   "cloud/code"]
    - local/reason:  ["hybrid/reason", "free/reason", "cloud/reason"]
    - local/fast:    ["hybrid/fast",   "free/fast",   "cloud/fast"]
    # Hybrid tier: hybrid → free → cloud
    - hybrid/chat:   ["free/chat",   "cloud/fast",  "cloud/chat"]
    - hybrid/code:   ["free/code",   "cloud/code",  "cloud/chat"]
    - hybrid/reason: ["free/reason", "cloud/reason","cloud/chat"]
    - hybrid/fast:   ["free/fast",   "cloud/fast"]
    # Cloud tier: try free before giving up entirely
    - cloud/fast:    ["free/fast",   "free/chat",   "hybrid/chat"]
    - cloud/chat:    ["free/chat",   "hybrid/chat"]
    - cloud/code:    ["free/code",   "hybrid/code"]
    - cloud/reason:  ["free/reason", "hybrid/reason"]
    # Free tier: degrade to hybrid if free models are all down
    - free/fast:     ["hybrid/fast",  "hybrid/chat"]
    - free/chat:     ["hybrid/chat"]
    - free/code:     ["hybrid/code"]
    - free/reason:   ["hybrid/reason"]


################################################################################
# GENERAL SETTINGS
################################################################################
general_settings:
  master_key: os.environ/LITELLM_API_KEY
  allow_requests_on_db_unavailable: true

  # ── Per-tier key templates ──────────────────────────────────────────────────
  # After startup, create keys via the UI or API:
  #
  #   POST http://localhost:4000/key/generate
  #   Authorization: Bearer $LITELLM_API_KEY
  #
  #   LOCAL tier key:
  #   { "models": ["local/chat","local/code","local/reason"],
  #     "metadata": {"tier":"local"}, "max_budget": null }
  #
  #   HYBRID tier key:
  #   { "models": ["local/*","hybrid/chat","hybrid/code","hybrid/reason","hybrid/fast"],
  #     "metadata": {"tier":"hybrid"}, "max_budget": 5.00,
  #     "budget_duration": "30d" }
  #
  #   CLOUD tier key:
  #   { "models": ["local/*","hybrid/*","cloud/*"],
  #     "metadata": {"tier":"cloud"}, "max_budget": 50.00,
  #     "budget_duration": "30d" }


################################################################################
# LOGGING
################################################################################
litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  success_callback: []
  failure_callback: []
