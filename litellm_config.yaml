################################################################################
# LiteLLM Proxy Config — Tiered Access (Local / Hybrid / Cloud)
#
# HOW TIERS WORK:
#   Users call the proxy with a model name that maps to their tier group.
#   The router handles fallbacks automatically within each tier.
#
#   Tier keys are issued via the /key/generate endpoint after startup:
#     Local  key → can only call "local/*" models
#     Hybrid key → can only call "hybrid/*" models
#     Cloud  key → can call everything
#
#   Or users can just use the model alias directly with the master key
#   during development/testing.
################################################################################

model_list:

  ##############################################################################
  # INDIVIDUAL MODELS (building blocks — referenced by groups below)
  ##############################################################################

  # ── OLLAMA (local Docker service) ──────────────────────────────────────────
  - model_name: _ollama-llama3
    litellm_params:
      model: ollama_chat/llama3.1:8b-instruct-q4_0
      api_base: http://ollama:11434

  # Fast 3B model for classification tasks
  - model_name: _ollama-fast
    litellm_params:
      model: ollama_chat/llama3.2:3b
      api_base: http://ollama:11434

  - model_name: _ollama-mistral
    litellm_params:
      model: ollama_chat/mistral:7b-instruct-q4_0
      api_base: http://ollama:11434

  - model_name: _ollama-deepseek
    litellm_params:
      model: ollama_chat/deepseek-r1:7b
      api_base: http://ollama:11434

  - model_name: _ollama-codellama
    litellm_params:
      model: ollama_chat/qwen2.5-coder:7b
      api_base: http://ollama:11434

  # ── OLLAMA CLOUD (VPS) ─────────────────────────────────────────────────────
  - model_name: _ollama-cloud-llama3
    litellm_params:
      model: ollama_chat/llama3.1:8b-instruct-q4_0
      api_base: os.environ/OLLAMA_CLOUD_API_BASE
      api_key: os.environ/OLLAMA_CLOUD_API_KEY

  - model_name: _ollama-cloud-mistral
    litellm_params:
      model: ollama_chat/mistral:7b-instruct-q4_0
      api_base: os.environ/OLLAMA_CLOUD_API_BASE
      api_key: os.environ/OLLAMA_CLOUD_API_KEY

  # ── CHEAP / FAST CLOUD (hybrid fallback candidates) ───────────────────────
