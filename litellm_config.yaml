litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  cache: true
  cache_params:
    type: qdrant-semantic
    qdrant_semantic_cache_embedding_model: _local-embedding
    qdrant_collection_name: litellm_semantic_cache
    qdrant_quantization_config: binary
    qdrant_semantic_cache_vector_size: 768
    similarity_threshold: 0.999
    ttl: 3600
    supported_call_types:
    - acompletion
    - completion
  success_callback:
  - prometheus
  callbacks:
  - factual_verifier.factual_verifier_instance
  - consensus_checker.consensus_checker_instance
  - ab_testing.ab_testing_instance
  - rag_retrieval.rag_retrieval_instance
  failure_callback:
  - prometheus
