    volumes:
    - /opt/agentic-sdlc/zep-config.yaml:/app/config.yaml:ro
    networks:
    - vibe_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -qi :1F40 /proc/net/tcp6"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignadvisory.service: "zep"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256m

  # ---------------------------------------------------------------------------
  # CDN Cache — long-term internal caching proxy for external CDN resources.
  # Intercepts CDN URLs rewritten by nginx sub_filter and serves from local
  # cache. Add new CDN origins in cdn-cache/nginx.conf + a sub_filter line.
  # ---------------------------------------------------------------------------
  cdn-cache:
    image: nginx:1.27-alpine
    container_name: cdn_cache
    security_opt:
      - no-new-privileges:true
    volumes:
    - cdn_cache_data:/var/cache/nginx/cdn
    - ./cdn-cache/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
    - vibe_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignadvisory.service: "cdn-cache"
