  # ---------------------------------------------------------------------------
  # Maltego Desktop Relay — nginx HTTP relay that terminates KasmWeb HTTPS
  # oauth2-proxy → this relay (HTTP:4184) → maltego-desktop (HTTPS:6901)
  # ---------------------------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64m
  maltego-desktop-relay:
    image: nginx:alpine
    container_name: maltego_desktop_relay
    security_opt:
      - no-new-privileges:true
    volumes:
