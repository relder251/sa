  # ---------------------------------------------------------------------------
  # cAdvisor — per-container CPU / memory / network / disk metrics
  # ---------------------------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64m
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    security_opt:
      - no-new-privileges:true
    command:
    - --housekeeping_interval=10s
    - --disable_metrics=disk,diskIO,referenced_memory
    devices:
    - /dev/kmsg
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
    networks:
    - vibe_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      com.sovereignadvisory.service: "cadvisor"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512m

  # ---------------------------------------------------------------------------
  # node-exporter — host CPU / memory / disk / network metrics
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    security_opt:
      - no-new-privileges:true
    command:
    - '--path.procfs=/host/proc'
    - '--path.rootfs=/rootfs'
    - '--path.sysfs=/host/sys'
    - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    network_mode: host
    pid: host
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    labels:
      com.sovereignadvisory.service: "node-exporter"

