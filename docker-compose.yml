    - RESEARCH_URL=http://sa_company_research:5004
    - SHODAN_API_KEY=${SHODAN_API_KEY:-}
    - HIBP_API_KEY=${HIBP_API_KEY:-}
    networks:
    - vibe_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      com.sovereignadvisory.service: "maltego-transforms"

  # ---------------------------------------------------------------------------
