      options:
        max-size: "10m"
        max-file: "3"
    labels:
      com.sovereignadvisory.service: "maltego-desktop"

  # ---------------------------------------------------------------------------
  # oauth2-proxy — Maltego Desktop GUI (port 4183)
  # Uses nginx auth_request mode: proxy validates session, nginx proxies to KasmWeb
  # ---------------------------------------------------------------------------
    deploy:
      resources:
        limits:
          cpus: '1.0'
  oauth2-proxy-maltego:
    image: sa_oauth2_proxy:v7.6.0
    container_name: oauth2_proxy_maltego
    security_opt:
