# maltego-relay — HTTP:4184 → HTTPS:6901 (KasmWeb self-signed)
# Sits between oauth2_proxy (Keycloak SSO) and KasmWeb desktop container.
# Bridges HTTP upstream to KasmWeb's self-signed HTTPS, and injects the
# KasmWeb Basic Auth header so end-users only ever authenticate via Keycloak.

server {
    listen 4184;
    server_name _;

    location / {
        proxy_pass https://maltego_desktop:6901;
        proxy_ssl_verify off;
        proxy_http_version 1.1;

        # Auto-authenticate against KasmWeb so the browser never sees the
        # Basic Auth challenge — Keycloak SSO is the only credential users need.
        proxy_set_header Authorization "Basic a2FzbV91c2VyOk1hbHRlZ28yMDI2IQ==";

        # WebSocket support (KasmVNC uses WebSockets for the desktop stream)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
