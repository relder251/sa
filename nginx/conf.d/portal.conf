server {
    listen 80;
    server_name home.private.sovereignadvisory.ai;
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;

    # services.json — must revalidate on every request so portal picks up changes immediately
    location = /services.json {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # LiteLLM provider health — used by portal for API access badges
    location /api/litellm-health {
        set $up_litellm http://litellm:4000;
        proxy_pass $up_litellm/health/services;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer sk-vibe-coding-key-123";
    }

    # Stack advisor: chat completions (API key injected server-side)
    location /api/stack-chat {
        set $up_litellm http://litellm:4000;
        proxy_pass $up_litellm/v1/chat/completions;
        proxy_set_header Authorization "Bearer sk-vibe-coding-key-123";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }

    # Stack advisor: embed query for RAG (API key injected server-side)
    location /api/stack-embed {
        set $up_litellm http://litellm:4000;
        proxy_pass $up_litellm/v1/embeddings;
        proxy_set_header Authorization "Bearer sk-vibe-coding-key-123";
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    # Stack advisor: Qdrant semantic search (RAG context retrieval)
    location /api/stack-search {
        set $up_qdrant http://qdrant:6333;
        proxy_pass $up_qdrant/collections/stack-knowledge/points/search;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    # Stack advisor: audit log (fire-and-forget to n8n)
    location /api/stack-advisor-audit {
        set $up_n8n http://n8n:5678;
        proxy_pass $up_n8n/webhook/stack-advisor-audit;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
    }

    location /api/portal-provision {
        set $up_n8n http://n8n:5678;
        proxy_pass $up_n8n/webhook/FrPgMVhkBNi9nE85/webhook/portal-provision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/portal-update-categories {
        set $up_n8n http://n8n:5678;
        proxy_pass $up_n8n/webhook/wgvZCgnHnlIkSEN5/webhook/portal-update-categories;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/portal-update {
        set $up_n8n http://n8n:5678;
        proxy_pass $up_n8n/webhook/HJu73t0odAN7bW2b/webhook/portal-update;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/portal-delete {
        set $up_n8n http://n8n:5678;
        proxy_pass $up_n8n/webhook/tUHxTclRAAU8xCih/webhook/portal-delete;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Docker API proxy — list running containers for terminal access
    location = /api/docker/containers {
        proxy_pass http://unix:/var/run/docker.sock:/v1.41/containers/json;
        proxy_set_header Host docker;
        proxy_buffering off;
    }
}
