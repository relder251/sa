# WebSocket upgrade map — required by the /terminal/ proxy below
map $http_upgrade $connection_upgrade {
    default  upgrade;
    ''       close;
}

server {
    listen 80;
    server_name home.private.sovereignadvisory.ai;

    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # LiteLLM provider health — used by portal for API access badges
    # Must appear before /api/ to make ordering intent explicit
    # (nginx longest-match prefix means /api/litellm-health always wins over /api/)
    location /api/litellm-health {
        proxy_pass http://litellm:4000/health?model=cloud/smart;
        proxy_set_header Host $host;
        proxy_read_timeout 20s;
        # NOTE: nginx does not support env var substitution in headers; key is
        # hardcoded here. This is internal-only (no public TLS), so risk is low.
        # To rotate: update this file and reload nginx.
        proxy_set_header Authorization "Bearer sk-vibe-coding-key-123";
    }

    # n8n provisioning webhooks — each maps to its workflow-ID-prefixed path
    # (n8n v1.x webhook URLs include the workflow ID: /webhook/<workflowId>/webhook/<path>)

    location /api/portal-provision {
        proxy_pass http://n8n:5678/webhook/FrPgMVhkBNi9nE85/webhook/portal-provision;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /api/portal-update-categories {
        proxy_pass http://n8n:5678/webhook/wgvZCgnHnlIkSEN5/webhook/portal-update-categories;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/portal-update {
        proxy_pass http://n8n:5678/webhook/HJu73t0odAN7bW2b/webhook/portal-update;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /api/portal-delete {
        proxy_pass http://n8n:5678/webhook/tUHxTclRAAU8xCih/webhook/portal-delete;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Web terminal proxy — xterm.js pages + WebSocket pty bridge
    # Each /terminal/<target> opens a shell session via shell_gateway.
    location /terminal/ {
        resolver 127.0.0.11 valid=30s;
        set $up_shell http://shell_gateway:7681;
        proxy_pass $up_shell;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
