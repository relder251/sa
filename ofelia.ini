# ofelia.ini — Cron schedule for free model sync
# Ofelia runs jobs inside existing containers via docker exec.
# Docs: https://github.com/mcuadros/ofelia

[job-exec "free-model-sync"]
schedule  = @every 6h
container = free_model_sync
command   = python /app/free_model_sync.py

[job-exec "daily-backup"]
# Ofelia uses 6-field cron: second minute hour day month weekday
# 0 0 2 * * * = at 02:00:00 every day
schedule  = 0 0 2 * * *
container = backup
command   = bash /backup.sh

[job-exec "sa-schema-guard"]
# Run at 03:00 daily — re-applies SA schema SQL (all IF NOT EXISTS, fully idempotent)
schedule  = 0 0 3 * * *
container = litellm_db
command   = psql -U litellm -d litellm -f /docker-entrypoint-initdb.d/20-sa-schema.sql

# portal-permissions disabled: @reboot schedule not supported by this ofelia version
# Original intent: ensure services.json writable by n8n on startup
# TODO: convert to a restart hook or entrypoint in n8n service instead
# [job-exec "portal-permissions"]
# schedule  = @reboot
# container = n8n
# command   = sh -c chown node:node /data/portal/services.json

[job-exec "vault-snapshot"]
# 01:30 daily — saves raft snapshot to vault/data/ for pickup by backup container at 02:00
schedule  = 0 30 1 * * *
container = vault
command   = sh /vault/scripts/vault-snapshot.sh

[job-exec "litellm-spend-cleanup"]
# Weekly at Sunday 03:30 — deletes LiteLLM_SpendLogs rows older than 90 days
# Safe: no-op when no qualifying rows; uses startTime index (btree)
# Dry-run confirmed 0 rows at 90-day cutoff (DB started 2026-03-14)
schedule  = 0 30 3 * * 0
container = litellm_db
command   = psql -U litellm -d litellm -f /opt/scripts/cleanup-spendlogs.sql

[job-run "offsite-backup-sync"]
# 02:45 daily — syncs backup dir to Google Drive after backup job (02:00) completes
# Uses official rclone image; OAuth token at config/rclone/rclone.conf (gitignored)
schedule  = 0 45 2 * * *
image     = rclone/rclone:latest
volume    = /opt/agentic-sdlc/backup:/backup:ro
volume    = /opt/agentic-sdlc/config/rclone:/config/rclone:ro
command   = sync /backup gdrive: --config /config/rclone/rclone.conf --log-level INFO
delete    = true

[job-exec "budget-alert"]
# 08:00 daily — check LiteLLM tier key spend vs budget limits
# Output captured by ofelia → Docker logs → promtail → Loki → Grafana
schedule  = 0 0 8 * * *
container = litellm
command   = python3 /app/budget_alert.py
