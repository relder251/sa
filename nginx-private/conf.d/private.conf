server {
    listen 443 ssl;
    http2 on;
    server_name vault.private.sovereignadvisory.ai;

    ssl_certificate     /etc/letsencrypt/live/private.sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/private.sovereignadvisory.ai/privkey.pem;

    client_max_body_size 10m;

    resolver 127.0.0.11 valid=30s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           "DENY" always;
    # Vaultwarden also sends HSTS, X-Content-Type-Options, X-Frame-Options, Referrer-Policy — hide to prevent duplicates
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Referrer-Policy;
    # Vaultwarden sets its own CSP — hide it and replace with ours to avoid dual-header intersection
    # wasm-unsafe-eval needed for WASM crypto; frame-ancestors allows Bitwarden browser extension embed
    proxy_hide_header Content-Security-Policy;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://vault.private.sovereignadvisory.ai https://haveibeenpwned.com https:; font-src 'self' data:; frame-ancestors 'self' chrome-extension:; object-src 'none';" always;

    location / {
        limit_req zone=private_general burst=10 nodelay;
        set $up_vw http://vaultwarden:80;
        proxy_pass $up_vw;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # WebSocket for live vault sync
    location /notifications/hub {
        set $up_vw_ws http://vaultwarden:80;
        proxy_pass $up_vw_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
}

