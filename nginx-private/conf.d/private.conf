# HTTP → HTTPS redirect for all private subdomains
server {
    resolver 127.0.0.11 valid=30s;
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    resolver 127.0.0.11 valid=30s;
    listen 443 ssl;
    http2 on;
    server_name n8n.private.sovereignadvisory.ai;

    ssl_certificate     /etc/letsencrypt/live/private.sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/private.sovereignadvisory.ai/privkey.pem;

    client_max_body_size 100m;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    location / {
        set $up_n8n http://oauth2_proxy_n8n:5679;
        proxy_pass $up_n8n;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

