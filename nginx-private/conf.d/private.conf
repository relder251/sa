# Container Terminal — terminal.private.sovereignadvisory.ai
# ttyd web terminal proxied with WebSocket support
# -----------------------------------------
server {
    resolver 127.0.0.11 valid=30s;
    listen 443 ssl;
    http2 on;
    server_name terminal.private.sovereignadvisory.ai;

    ssl_certificate     /etc/letsencrypt/live/private.sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/private.sovereignadvisory.ai/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           "DENY" always;
    # Terminal must never be embedded; lock down connect-src to websocket only
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://terminal.private.sovereignadvisory.ai; font-src 'self'; frame-ancestors 'none'; object-src 'none';" always;

    location / {
        limit_req zone=private_general burst=10 nodelay;
        set $up_ttyd http://ttyd:7681;
        proxy_pass $up_ttyd;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

# -----------------------------------------
# Grafana — grafana.private.sovereignadvisory.ai
# -----------------------------------------
server {
    resolver 127.0.0.11 valid=30s;
    listen 443 ssl;
    http2 on;
    server_name grafana.private.sovereignadvisory.ai;

    ssl_certificate     /etc/letsencrypt/live/private.sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/private.sovereignadvisory.ai/privkey.pem;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           "DENY" always;
    # Grafana sets its own CSP — replace it to avoid dual-header intersection breaking dashboards
    proxy_hide_header Content-Security-Policy;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://grafana.private.sovereignadvisory.ai https:; font-src 'self' data:; frame-ancestors 'none'; object-src 'none';" always;

    # Static assets — no rate limit; Grafana 12 loads ~40+ JS chunks in parallel on first load
    location /public/ {
        set $up_grafana http://oauth2_proxy_grafana:3002;
        proxy_pass $up_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # API calls — no rate limit; dashboard/panel queries fire many parallel requests;
    # protected by oauth2_proxy auth and Twingate network gate
    location /api/ {
        set $up_grafana http://oauth2_proxy_grafana:3002;
        proxy_pass $up_grafana;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location / {
        limit_req zone=private_general burst=10 nodelay;
        set $up_grafana http://oauth2_proxy_grafana:3002;
        proxy_pass $up_grafana;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

