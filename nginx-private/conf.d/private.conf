# sovereignadvisory.ai — handles requests routed here via Twingate
server {
    listen 443 ssl;
    http2 on;
    server_name sovereignadvisory.ai www.sovereignadvisory.ai;

    ssl_certificate     /etc/letsencrypt/live/sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sovereignadvisory.ai/privkey.pem;

    resolver 127.0.0.11 valid=30s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           "DENY" always;
    # Flask lead review app — simple server-rendered, no inline scripts
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; object-src 'none';" always;

    location /review/ {
        set $upstream_review http://sa_lead_review:5003;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        set $upstream_review http://sa_lead_review:5003;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /api/review/ {
        set $upstream_review http://sa_lead_review:5003;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /n8n/webhook/ {
        set $upstream_n8n_wh http://n8n:5678;
        proxy_pass         $upstream_n8n_wh/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /n8n/ {
        set $upstream_n8n http://n8n:5678;
        proxy_pass         $upstream_n8n/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location / {
        return 301 https://www.sovereignadvisory.ai$request_uri;
    }
}

# -----------------------------------------
# Agent Zero — a0.private.sovereignadvisory.ai
# Routes to oauth2_proxy_agent_zero for Keycloak SSO gating
# WebSocket support required for real-time agent communication
# -----------------------------------------
server {
    resolver 127.0.0.11 valid=30s;
    listen 443 ssl;
    http2 on;
    server_name a0.private.sovereignadvisory.ai;

    ssl_certificate     /etc/letsencrypt/live/private.sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/private.sovereignadvisory.ai/privkey.pem;

    client_max_body_size 100m;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' wss://a0.private.sovereignadvisory.ai https:; font-src 'self' data:; frame-ancestors 'none'; object-src 'none';" always;

    location / {
        set $up_agent_zero http://oauth2_proxy_agent_zero:50081;
        proxy_pass $up_agent_zero;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300s;

        # CDN URL rewriting - transparent, handled by internal cdn_cache container
        sub_filter 'https://cdn.jsdelivr.net/' '/cdn-cache/cdn.jsdelivr.net/';
        sub_filter 'loggedIn: "false" === "true"' 'loggedIn: "true" === "true"';
        sub_filter_once off;
    }

    # Internal CDN cache - strips /cdn-cache/ prefix and proxies to cdn_cache container
    location /cdn-cache/ {
        set $up_cdn_cache http://cdn_cache:80;
        rewrite ^/cdn-cache/(.*)$ /$1 break;
        proxy_pass $up_cdn_cache;
    }
}

