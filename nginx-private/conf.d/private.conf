        proxy_set_header X-Forwarded-Proto https;
    }
}
# sovereignadvisory.ai — handles requests routed here via Twingate
server {
    listen 443 ssl;
    http2 on;
    server_name sovereignadvisory.ai www.sovereignadvisory.ai;

    ssl_certificate     /etc/letsencrypt/live/sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sovereignadvisory.ai/privkey.pem;

    resolver 127.0.0.11 valid=30s;

    location /review/ {
        set $upstream_review http://sa_lead_review:5003;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /auth/ {
        set $upstream_review http://sa_lead_review:5003;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /api/review/ {
        set $upstream_review http://sa_lead_review:5003;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

        location /n8n/webhook/ {
        proxy_pass         http://n8n:5678/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /n8n/ {
        set $upstream_n8n http://n8n:5678;
        proxy_pass         $upstream_n8n/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location / {
        return 301 https://www.sovereignadvisory.ai$request_uri;
    }
}
