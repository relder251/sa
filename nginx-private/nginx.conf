events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Docker internal DNS — resolves upstream container names at request time
    # so nginx starts even when upstream containers are temporarily unavailable
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    include /etc/nginx/conf.d/*.conf;
}
