events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    # TLS hardening — applied globally to all server blocks
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Docker internal DNS — resolves upstream container names at request time
    # so nginx starts even when upstream containers are temporarily unavailable
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # Static-asset exemption: empty key disables rate limiting in nginx
    # SPAs (n8n, Jupyter, Vaultwarden, Keycloak) load 50-100 JS/CSS chunks in
    # parallel on first page load — rate limiting those assets causes 503 storms.
    map $uri $rate_limit_key {
        ~*\.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico|webp|map|json|txt|xml|gz)$  "";
        default  $binary_remote_addr;
    }

    # -- Rate limiting ---------------------------------------------------------
    # General: 30 req/min per IP — UI services (n8n, Grafana, Keycloak, etc.)
    limit_req_zone $rate_limit_key zone=private_general:10m rate=30r/m;
    # API: 60 req/min per IP — API-style services (LiteLLM, Ollama)
    limit_req_zone $rate_limit_key zone=private_api:10m rate=60r/m;

    include /etc/nginx/conf.d/*.conf;
}
