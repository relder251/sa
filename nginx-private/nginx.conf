events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Docker internal DNS — resolves upstream container names at request time
    # so nginx starts even when upstream containers are temporarily unavailable
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # -- Rate limiting ---------------------------------------------------------
    # General: 30 req/min per IP — UI services (n8n, Grafana, Keycloak, etc.)
    limit_req_zone $binary_remote_addr zone=private_general:10m rate=30r/m;
    # API: 60 req/min per IP — API-style services (LiteLLM, Ollama)
    limit_req_zone $binary_remote_addr zone=private_api:10m rate=60r/m;

    include /etc/nginx/conf.d/*.conf;
}
