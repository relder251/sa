user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # External DNS for resolving CDN hostnames
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;

    proxy_cache_path /var/cache/nginx/cdn
        levels=1:2
        keys_zone=cdn_long_term:20m
        max_size=2g
        inactive=3650d
        use_temp_path=off;

    server {
        listen 80;
        server_name _;

        # Health check
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # -------------------------------------------------------------------
        # cdn.jsdelivr.net
        # To add a new CDN origin: duplicate this block, update the location
        # prefix, proxy_pass URL, and Host header to match.
        # -------------------------------------------------------------------
        location /cdn.jsdelivr.net/ {
            proxy_pass         https://cdn.jsdelivr.net/;
            proxy_set_header   Host cdn.jsdelivr.net;
            proxy_set_header   Cookie "";
            proxy_set_header   Authorization "";
            proxy_ssl_server_name on;

            proxy_cache        cdn_long_term;
            proxy_cache_key    "$uri";
            proxy_cache_valid  200 3650d;
            proxy_cache_use_stale error timeout updating;
            proxy_cache_lock   on;

            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
