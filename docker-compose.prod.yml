# =============================================================================
# docker-compose.prod.yml — PROD DELTA
# NOT a standalone file — apply on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# Adds: nginx (public), certbot (HTTP-01), twingate, vaultwarden.
# Overrides Keycloak to `start` with postgres backend.
# Port bindings: only nginx-public gets public-facing ports.
# =============================================================================

services:

  # Keycloak prod override: start mode with postgres backend
  keycloak:
    command: start
    environment:
    - KEYCLOAK_ADMIN=admin
    - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    - KC_DB=postgres
    - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
    - KC_DB_USERNAME=${LITELLM_USER:-litellm}
    - KC_DB_PASSWORD=${LITELLM_PASSWORD:-litellm_password}
    - KC_HOSTNAME=${KC_HOSTNAME:-kc.sovereignadvisory.ai}
    - KC_HOSTNAME_STRICT=false
    - KC_PROXY_HEADERS=xforwarded
    - KC_HTTP_ENABLED=true
    - KC_HEALTH_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      com.centurylinklabs.watchtower.enable: "true"
      com.sovereignadvisory.service: "keycloak"

  # Redis — tighten Docker memory limit to 2x maxmemory (256MB → 512MB cap)
  redis:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512m

  # node-exporter — bind to loopback + Docker bridge only (not 0.0.0.0)
  # Prometheus scrapes via 172.20.0.1:9100 (vibe_net gateway); public access blocked
  node-exporter:
    command:
    - '--path.procfs=/host/proc'
    - '--path.rootfs=/rootfs'
    - '--path.sysfs=/host/sys'
    - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    - '--web.listen-address=127.0.0.1:9100'
    - '--web.listen-address=172.20.0.1:9100'

  # nginx-private: expose on loopback only (Twingate accesses via host network)
  nginx-private:
    ports:
    - "127.0.0.1:443:443"

  # Public-facing nginx — TLS termination and reverse proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: sa_nginx
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
    - "187.77.208.197:80:80"
    - "187.77.208.197:443:443"
    volumes:
    - /opt/agentic-sdlc/nginx-public/nginx.conf:/etc/nginx/nginx.conf:ro
    - /opt/agentic-sdlc/nginx-public/conf.d:/etc/nginx/conf.d:ro
    - /opt/agentic-sdlc/www:/usr/share/nginx/html:ro
    - /opt/agentic-sdlc/ssl:/etc/letsencrypt:ro
    - /opt/agentic-sdlc/ssl/dhparam:/etc/nginx/dhparam:ro
    - /opt/agentic-sdlc/certbot/www:/var/www/certbot:ro
    - /opt/agentic-sdlc/logs:/var/log/nginx
    networks:
    - sa_web
    - vibe_net
    healthcheck:
      test: ["CMD", "sh", "-c", "nginx -t 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      com.sovereignadvisory.service: "nginx"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128m

  # Certbot HTTP-01 — renews public-facing TLS certs via webroot
  certbot:
    image: certbot/certbot:latest
    container_name: sa_certbot
    security_opt:
      - no-new-privileges:true
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
    - /opt/agentic-sdlc/ssl:/etc/letsencrypt
    - /opt/agentic-sdlc/certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet;
          sleep 12h & wait $${!};
        done"
    networks:
    - sa_web
    labels:
      com.sovereignadvisory.service: "certbot"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64m

  # Twingate — zero-trust network connector
  twingate:
    image: twingate/connector:1
    container_name: twingate-friendly-jaguar
    security_opt:
      - no-new-privileges:true
    pull_policy: always
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      TWINGATE_NETWORK: ${TWINGATE_NETWORK}
      TWINGATE_ACCESS_TOKEN: ${TWINGATE_ACCESS_TOKEN}
      TWINGATE_REFRESH_TOKEN: ${TWINGATE_REFRESH_TOKEN}
      TWINGATE_LABEL_HOSTNAME: ${TWINGATE_LABEL_HOSTNAME:-}
      TWINGATE_LOG_LEVEL: ${TWINGATE_LOG_LEVEL:-3}
      TWINGATE_LABEL_DEPLOYED_BY: docker
    network_mode: host
    labels:
      com.sovereignadvisory.service: "twingate"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64m

  # Twingate — hasty-spider connector (redundant)
  twingate-spider:
    image: twingate/connector:1
    container_name: twingate-hasty-spider
    security_opt:
      - no-new-privileges:true
    pull_policy: always
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      TWINGATE_NETWORK: ${TWINGATE_NETWORK}
      TWINGATE_ACCESS_TOKEN: ${TWINGATE_ACCESS_TOKEN_SPIDER}
      TWINGATE_REFRESH_TOKEN: ${TWINGATE_REFRESH_TOKEN_SPIDER}
      TWINGATE_LABEL_HOSTNAME: ${TWINGATE_LABEL_HOSTNAME:-}
      TWINGATE_LOG_LEVEL: ${TWINGATE_LOG_LEVEL:-3}
      TWINGATE_LABEL_DEPLOYED_BY: docker
    network_mode: host
    labels:
      com.sovereignadvisory.service: "twingate"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64m

  # Vault Root — Transit seal provider for main Vault (self-hosted KMS)
  vault-root:
    image: hashicorp/vault:1.18
    container_name: vault-root
    restart: unless-stopped
    cap_add:
    - IPC_LOCK
    environment:
    - VAULT_ADDR=http://0.0.0.0:8300
    volumes:
    - ./vault-root/data:/vault/data
    - ./vault-root/config/vault-root.hcl:/vault/config/vault.hcl:ro
    command: vault server -config=/vault/config/vault.hcl
    networks:
    - vibe_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8300"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      com.sovereignadvisory.service: "vault-root"
      com.centurylinklabs.watchtower.enable: "false"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 512m  # raised from 256m — OOM at 256m (commit 4b92650)

  # HashiCorp Vault — secrets management enclave
  vault:
    image: hashicorp/vault:1.18
    container_name: vault
    restart: unless-stopped
    cap_add:
    - IPC_LOCK
    environment:
    - VAULT_ADDR=http://0.0.0.0:8200
    - VAULT_API_ADDR=https://secrets.private.sovereignadvisory.ai
    - VAULT_TOKEN=${VAULT_TRANSIT_TOKEN}  # transit seal auth token for vault-root
    depends_on:
      vault-root:
        condition: service_healthy
    volumes:
    - ./vault/data:/vault/data
    - ./vault/logs:/vault/logs
    - ./vault/config/vault.hcl:/vault/config/vault.hcl:ro
    - ./scripts:/vault/scripts:ro
    - ./vault/logs:/vault/logs
    command: vault server -config=/vault/config/vault.hcl
    ports:
    - "127.0.0.1:8200:8200"
    networks:
    - vibe_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      com.sovereignadvisory.service: "vault"
      com.centurylinklabs.watchtower.enable: "false"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512m

  # Vaultwarden — self-hosted Bitwarden-compatible password vault
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
    - DOMAIN=https://vault.private.sovereignadvisory.ai
    - SIGNUPS_ALLOWED=false
    - INVITATIONS_ALLOWED=true
    - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
    - SSO_ENABLED=true
    - SSO_ONLY=false
    - SSO_AUTHORITY=${KEYCLOAK_ISSUER_URL}/realms/agentic-sdlc
    - SSO_CLIENT_ID=vaultwarden
    - SSO_CLIENT_SECRET=${VAULTWARDEN_OIDC_CLIENT_SECRET}
    - SMTP_HOST=${NEO_SMTP_HOST}
    - SMTP_PORT=${NEO_SMTP_PORT}
    - SMTP_SECURITY=force_tls
    - SMTP_USERNAME=${NEO_SMTP_USER}
    - SMTP_PASSWORD=${NEO_SMTP_PASS}
    - SMTP_FROM=${NOTIFY_EMAIL}
    - SMTP_FROM_NAME=Sovereign Advisory Vault
    volumes:
    - vaultwarden_data:/data
    networks:
    - vibe_net
    labels:
      com.sovereignadvisory.service: "vaultwarden"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1g
