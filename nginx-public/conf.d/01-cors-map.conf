# CORS origin allowlist for /n8n/webhook/
# $cors_origin resolves to the request's Origin header only for whitelisted
# domains; unlisted origins (including empty) resolve to "", which browsers
# reject as an invalid CORS response.
map $http_origin $cors_origin {
    default                               "";
    "https://sovereignadvisory.ai"        $http_origin;
    "https://www.sovereignadvisory.ai"    $http_origin;
}
