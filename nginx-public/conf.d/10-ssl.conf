# HTTPS — main site + internal proxy routes
# Renamed to 10-ssl.conf by install.sh after certbot issues the certificate.

server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    http2  on;
    server_name  sovereignadvisory.ai www.sovereignadvisory.ai;

    # ── SSL certificates ───────────────────────────────────────────────────────
    ssl_certificate      /etc/letsencrypt/live/sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/sovereignadvisory.ai/privkey.pem;
    ssl_dhparam          /etc/nginx/dhparam/dhparam.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Docker DNS resolver — resolves upstream hostnames at request time ───────
    # Docker DNS resolver — resolves upstream hostnames at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Static site ────────────────────────────────────────────────────────────
    location / {
        limit_req   zone=general burst=20 nodelay;
        limit_conn  addr 20;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, no-transform" always;
    }

    # Long-cache for immutable assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|pdf)$ {
        expires     30d;
        add_header  Cache-Control "public, immutable" always;
        access_log  off;
    }




    # ── Internal tools — explicitly blocked on public internet ────────────────
    # n8n webhook endpoints — public (contact form intake)
    location /n8n/webhook/ {
        # Late-binding via variable prevents nginx startup failure if n8n is not yet running.
        # /n8n/webhook/<id>/webhook/<path> → /webhook/<id>/webhook/<path>
        set $up_n8n http://n8n:5678;
        proxy_pass         $up_n8n/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
    # n8n UI — blocked on public internet
    location /n8n/        { return 403; }
    location /dashboard/  { return 403; }
    location /api/backup  { return 403; }

    # ── Lead Review Portal ─────────────────────────────────────────────────────
    # Redirect double-path /review/review/{token} → /review/{token}
    location ~ ^/review/review/(.+)$ {
        return 301 /review/$1;
    }

    # Serves the lead review page and its API at /review/{token}
    location /review/ {
        set $upstream_review http://sa_lead_review:5003;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/review/ {
        set $upstream_review http://sa_lead_review:5003;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }



    # ── OIDC Callback (lead-review SSO flow) ─────────────────────────────────
    location /auth/ {
        set $upstream_review http://sa_lead_review:5003;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Block access to hidden files / sensitive paths ─────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|git|htaccess|htpasswd|sql|bak|log)$ {
        deny all;
        return 404;
    }
}

# ── Keycloak SSO (public OIDC login endpoint) ─────────────────────────────────
server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    http2  on;
    server_name  kc.sovereignadvisory.ai;

    ssl_certificate      /etc/letsencrypt/live/sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/sovereignadvisory.ai/privkey.pem;
    ssl_dhparam          /etc/nginx/dhparam/dhparam.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # Allow the login-status-iframe to be loaded from the private admin hostname
    # Keycloak sends X-Frame-Options: SAMEORIGIN on all responses; strip it here
    # and replace with CSP frame-ancestors so the admin SPA session check works.
    location ~ ^/realms/[^/]+/protocol/openid-connect/login-status-iframe\.html {
        set $upstream_kc http://keycloak:8080;
        proxy_pass         $upstream_kc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_hide_header  X-Frame-Options;
        add_header         Content-Security-Policy "frame-ancestors 'self' https://kc.private.sovereignadvisory.ai" always;
    }

    location / {
        set $upstream_kc http://keycloak:8080;
        proxy_pass         $upstream_kc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }
}

# ── Internal Access Portal — home.private.sovereignadvisory.ai ───────────────
# Handles Twingate clients that route to the public IP (187.77.208.197:443).
# Proxies through oauth2_proxy_portal for Keycloak SSO gating, same as
# the sa_nginx_private server block.
server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    http2  on;
    server_name  home.private.sovereignadvisory.ai;

    ssl_certificate     /etc/letsencrypt/live/private.sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/private.sovereignadvisory.ai/privkey.pem;
    ssl_stapling        on;
    ssl_stapling_verify on;

    client_max_body_size 10m;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $up_portal http://oauth2_proxy_portal:4185;
        proxy_pass $up_portal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
