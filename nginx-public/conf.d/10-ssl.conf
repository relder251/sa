# HTTPS — main site + internal proxy routes
# Renamed to 10-ssl.conf by install.sh after certbot issues the certificate.

server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    http2  on;
    server_name  sovereignadvisory.ai www.sovereignadvisory.ai;

    # ── SSL certificates ───────────────────────────────────────────────────────
    ssl_certificate      /etc/letsencrypt/live/sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/sovereignadvisory.ai/privkey.pem;
    ssl_dhparam          /etc/nginx/dhparam/dhparam.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    # ── Security headers ───────────────────────────────────────────────────────
    # Shared snippet — also included in locations that have their own add_header
    # (nginx does not inherit server-level add_header in such locations)
    include /etc/nginx/conf.d/snippets/security-headers.conf;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Docker DNS resolver — resolves upstream hostnames at request time ───────
    # Docker DNS resolver — resolves upstream hostnames at request time
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Static site ────────────────────────────────────────────────────────────
    location / {
        limit_req   zone=general burst=20 nodelay;
        limit_conn  addr 20;
        try_files $uri $uri/ /index.html;
        expires 1h;
        include /etc/nginx/conf.d/snippets/security-headers.conf;
        add_header Cache-Control "public, no-transform" always;
    }

    # Long-cache for immutable assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|pdf)$ {
        expires     30d;
        include /etc/nginx/conf.d/snippets/security-headers.conf;
        add_header  Cache-Control "public, immutable" always;
        access_log  off;
    }




    # ── Internal tools — explicitly blocked on public internet ────────────────
    # n8n webhook endpoints — public (contact form intake)
    location /n8n/webhook/ {
        # CORS preflight — headers must live INSIDE the if block (nginx evil-if)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "$cors_origin";
            add_header Access-Control-Allow-Methods "POST, GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Access-Control-Max-Age       86400;
            return 204;
        }

        # CORS headers for actual POST requests
        add_header Access-Control-Allow-Origin  "$cors_origin" always;
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        # /n8n/webhook/<path> → /webhook/<path>
        proxy_pass         http://n8n:5678/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
    # n8n UI — blocked on public internet
    location /n8n/        { return 403; }
    location /dashboard/  { return 403; }
    location /api/backup  { return 403; }

    # ── Lead Review Portal ─────────────────────────────────────────────────────
    # Redirect double-path /review/review/{token} → /review/{token}
    location ~ ^/review/review/(.+)$ {
        return 301 /review/$1;
    }

    # Serves the lead review page and its API at /review/{token}
    location /review/ {
        set $upstream_review http://sa_lead_review:5003;
        # Include non-CSP security headers — breaks server-level add_header inheritance
        # so the upstream (FastAPI) nonce-based CSP passes through without duplication
        include /etc/nginx/conf.d/snippets/security-headers-no-csp.conf;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/review/ {
        set $upstream_review http://sa_lead_review:5003;
        include /etc/nginx/conf.d/snippets/security-headers-no-csp.conf;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }



    # ── OIDC Callback (lead-review SSO flow) ─────────────────────────────────
    location /auth/ {
        set $upstream_review http://sa_lead_review:5003;
        include /etc/nginx/conf.d/snippets/security-headers-no-csp.conf;
        proxy_pass         $upstream_review;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Block access to hidden files / sensitive paths ─────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|git|htaccess|htpasswd|sql|bak|log)$ {
        deny all;
        return 404;
    }
}

# ── Keycloak SSO (public OIDC login endpoint) ─────────────────────────────────
server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    http2  on;
    server_name  kc.sovereignadvisory.ai;

    ssl_certificate      /etc/letsencrypt/live/sovereignadvisory.ai/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/sovereignadvisory.ai/privkey.pem;
    ssl_dhparam          /etc/nginx/dhparam/dhparam.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_kc http://keycloak:8080;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;

        # Suppress duplicate security headers sent by Keycloak upstream
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header X-Frame-Options;

        proxy_pass         $upstream_kc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }
}
