# Security headers — shared snippet
# Include in: server block + any location with its own add_header directives
# (nginx does not inherit server-level add_header inside locations that define their own)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options           "SAMEORIGIN" always;
add_header X-Content-Type-Options    "nosniff" always;
add_header X-XSS-Protection          "1; mode=block" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'sha256-d5Aso7K6IFENWo7zmpodgU5jNN48Gwr+QPuj3T9XVJ4='; style-src 'self' 'unsafe-hashes' 'sha256-Objv/EB1KqSeF5p7Dluh+hIhGMYYmAYAnYNZTrE9NMs=' 'sha256-TW6Fn/papFPla/cFlMQjEsm21E3cR74x+ofvX+C4x3Y=' 'sha256-biUtbdRWL5fbF6gyheDmBHc7kOPvW4WGEbHQl8JNfRY=' 'sha256-PdWr+mHaxlaPMqNgI1MSN43Q6R++/6uk1QKAq+MOa70=' 'sha256-VCX/VLeJ09ZFyBSSL+OJUdzxsNAjbk+aaJTXpS13MKQ=' 'sha256-Hty6XRAynKkp0o63Pf7NnzT/Xyl3zRCZXiTzCW4OGHM=' 'sha256-gEDNRBzwk5hBc9Zs/l0pEOahkhv5xd7E0vOHDfoT7BY=' 'sha256-/YcVmhX+vfwImmd69ORHbq8S7n4bRyyqFi1VAIQtJJY=' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
