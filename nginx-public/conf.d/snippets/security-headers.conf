# Security headers — shared snippet
# Include in: server block + any location with its own add_header directives
# (nginx does not inherit server-level add_header inside locations that define their own)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options           "SAMEORIGIN" always;
add_header X-Content-Type-Options    "nosniff" always;
add_header X-XSS-Protection          "1; mode=block" always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'sha256-d5Aso7K6IFENWo7zmpodgU5jNN48Gwr+QPuj3T9XVJ4='; style-src 'self' 'sha256-R8soM2VhnX9r7Ms6C4LxKiL2j2VpGmKGW9KCml0FaWY=' 'sha256-TW6Fn/papFPla/cFlMQjEsm21E3cR74x+ofvX+C4x3Y=' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
