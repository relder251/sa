# HTTP — ACME challenge pass-through + redirect everything else to HTTPS
server {
    listen       80;
    listen  [::]:80;
    server_name  sovereignadvisory.ai www.sovereignadvisory.ai kc.sovereignadvisory.ai;

    # Let's Encrypt / certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
